services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: medienscouts
      POSTGRES_USER: medienscouts
      POSTGRES_PASSWORD: medienscouts
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  web:
    build: .
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg2://medienscouts:medienscouts@postgres:5432/medienscouts
      RATELIMIT_STORAGE_URI: redis://redis:6379/1
      MAX_CONTENT_LENGTH: 6291456
      MAX_PROFILE_IMAGE_SIZE: 2097152
      MAX_TICKET_ATTACHMENT_SIZE: 5242880
    ports:
      - "8000:8000"
    volumes:
      - instance_data:/app/instance
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  instance_data:
